<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        background: #0f0f1a;
        color: #fff;
        overflow: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #fff;
        border-radius: 50%;
        animation: twinkle 3s infinite ease-in-out alternate;
      }

      @keyframes twinkle {
        0% {
          opacity: 0.2;
          transform: scale(1);
        }
        100% {
          opacity: 1;
          transform: scale(1.3);
        }
      }

      .container {
        text-align: center;
        z-index: 1;
        position: relative;
        padding: 2rem;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 800;
        background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradient-shift 4s ease infinite;
        line-height: 1;
        margin-bottom: 0.5rem;
      }

      @keyframes gradient-shift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .message {
        font-size: clamp(1rem, 3vw, 1.5rem);
        font-weight: 300;
        color: #b8b8d0;
        margin-bottom: 0.5rem;
        letter-spacing: 0.05em;
      }

      .french-quote {
        font-size: clamp(0.9rem, 2.5vw, 1.2rem);
        font-weight: 600;
        color: #a78bfa;
        font-style: italic;
        margin-bottom: 2.5rem;
        opacity: 0.9;
      }

      .home-btn {
        display: inline-block;
        padding: 0.8rem 2.5rem;
        border: 2px solid #764ba2;
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        background: transparent;
      }

      .home-btn:hover {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-color: transparent;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(118, 75, 162, 0.4);
      }

      .orbit {
        position: absolute;
        width: 300px;
        height: 300px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: spin 20s linear infinite;
      }

      .orbit::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        background: #764ba2;
        border-radius: 50%;
        top: -4px;
        left: 50%;
        box-shadow: 0 0 15px #764ba2;
      }

      .orbit:nth-child(2) {
        width: 450px;
        height: 450px;
        animation-duration: 30s;
        animation-direction: reverse;
        border-color: rgba(255, 255, 255, 0.03);
      }

      .orbit:nth-child(2)::after {
        background: #667eea;
        box-shadow: 0 0 15px #667eea;
        width: 6px;
        height: 6px;
        top: -3px;
      }

      @keyframes spin {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>

    <div class="orbit"></div>
    <div class="orbit"></div>

    <div class="container">
      <div class="error-code">404</div>
      <p class="message">Lost in space</p>
      <p class="french-quote">Ceci n'est pas une page</p>
      <a href="/" class="home-btn">Return Home</a>
    </div>

    <script>
      const starsContainer = document.getElementById("stars");
      for (let i = 0; i < 80; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.animationDelay = Math.random() * 3 + "s";
        star.style.animationDuration = 2 + Math.random() * 3 + "s";
        starsContainer.appendChild(star);
      }
    </script>
  </body>
</html>
